services:
  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_GATEWAY_URL: http://localhost:8080
      VITE_REALTIME_URL: ws://localhost:4000/ws
    depends_on:
      - gateway
      - realtime

  gateway:
    build: ./services/gateway
    ports:
      - "8080:8080"
    environment:
      CARD_GEN_URL: http://card-gen:5000
      SHUFFLE_URL: http://shuffle:5001
      JUDGE_URL: http://judge:5002
      QUEUE_URL: http://queue:5003
      SERIALIZER_URL: http://serializer:5004
      POKEDEX_URL: http://pokedex:5005
    depends_on:
      - card-gen
      - shuffle
      - judge
      - queue
      - serializer
      - pokedex

  judge:
    build: ./services/judge
    ports:
      - "5002:5002"

  realtime:
    build: ./services/realtime
    ports:
      - "4000:4000"

  card-gen:
    build: ./services/card-gen
    ports:
      - "5000:5000"
    volumes:
      - ./services/card-gen/data:/app/data:ro

  shuffle:
    build: ./services/shuffle
    ports:
      - "5001:5001"

  queue:
    build: ./services/queue
    ports:
      - "5003:5003"

  serializer:
    build: ./services/serializer
    ports:
      - "5004:5004"

  pokedex:
    build: ./services/pokedex
    ports:
      - "5005:5005"
    volumes:
      - pokedex_data:/data

  tasks:
    build: ./services/tasks
    profiles:
      - tools

volumes:
  pokedex_data:
