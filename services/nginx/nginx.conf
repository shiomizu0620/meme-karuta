events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;

    location /api/ {
      set $upstream_gateway http://gateway:8080;
      proxy_pass $upstream_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
      set $upstream_realtime http://realtime:4000;
      proxy_pass $upstream_realtime;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    location / {
      set $upstream_frontend http://frontend:5173;
      proxy_pass $upstream_frontend;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
